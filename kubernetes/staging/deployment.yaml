apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopeasy-deployment
  namespace: staging
  labels:
    app: shopeasy
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopeasy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopeasy
        environment: staging
    spec:
      containers:
      - name: shopeasy
        image: 093435167670.dkr.ecr.ap-south-1.amazonaws.com/shopeasy-app:latest
        ports:
        - containerPort: 8080
        env:
        - name: ENVIRONMENT
          value: "staging"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5